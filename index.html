<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Ascend V8.1</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ascend">
    <meta name="theme-color" content="#070912">
    <link rel="stylesheet" href="style.css?v=8.1">
</head>
<body>

<!-- Toasts -->
<div class="toast-container" id="toast-container"></div>

<!-- V6.0a: Floating mood button -->
<button class="mood-fab" id="mood-fab" onclick="openMoodPanel()" title="Note ton humeur">
    <span id="mood-fab-icon">😊</span>
    <span class="mood-fab-pulse" id="mood-fab-pulse"></span>
</button>

<!-- Debug mode toggle -->
<button class="debug-toggle" id="debug-mode-btn"
    onclick="toggleDebugMode()" title="Activer/désactiver le mode test">🛠 Test OFF</button>
<button class="debug-toggle debug-panel-btn" id="debug-panel-btn"
    onclick="toggleDebugPanel()" title="Ouvrir le panneau test"
    style="display:none;bottom:116px;">⚙️</button>
<div class="debug-panel" id="debug-panel">
    <h4>🛠 Mode Test</h4>
    <div class="debug-row">
        <label>Date</label>
        <input type="date" id="debug-date" />
    </div>
    <button class="btn-dbg" onclick="debugNextDay()">⏩ Jour suivant</button>
    <button class="btn-dbg" onclick="debugNextWeek()">⏭ Semaine suivante</button>
    <button class="btn-dbg" onclick="debugApplyDate()">📅 Appliquer la date</button>
    <button class="btn-dbg" onclick="debugCheckAll()">✅ Tout cocher</button>
    <button class="btn-dbg" onclick="debugUncheckAll()">☐ Tout décocher</button>
    <p class="debug-note">Mode test activé. Désactive pour jouer normalement.</p>
</div>

<!-- Top bar -->
<div class="top-bar">
    <div class="top-bar-greeting">
        Bonjour, <strong id="top-username">Hero</strong>
    </div>
    <div class="top-bar-center">
        <span class="top-global-pill" id="top-global-level">Niv. 1</span>
    </div>
    <div class="top-bar-actions">
        <button class="top-bar-btn" title="Paramètres" onclick="openSettingsModal()">⚙️</button>
    </div>
</div>

<!-- Calendar modal (shared component) -->
<div class="modal-overlay" id="calendar-modal" style="display:none;">
    <div class="modal-box" style="max-width:340px;">
        <div class="modal-title gold" id="calendar-modal-title">📅 Calendrier</div>
        <div class="calendar-nav">
            <button class="cal-nav-btn" onclick="calendarPrevMonth()">‹</button>
            <span class="cal-month-label" id="cal-month-label"></span>
            <button class="cal-nav-btn" onclick="calendarNextMonth()">›</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="modal-actions" style="margin-top:12px;">
            <button class="btn-cancel" onclick="closeCalendarModal()">Fermer</button>
        </div>
    </div>
</div>

<div class="container">

    <!-- PAGE: HABITUDES -->
    <div class="page active" data-page="habits">
        <!-- V8.0: sub-tabs Habitudes / Tâches -->
        <div class="habits-subtab-row">
            <button class="habits-subtab active" data-subtab="habits" onclick="switchHabitsSubtab('habits')">✅ Habitudes</button>
            <button class="habits-subtab" data-subtab="tasks" onclick="switchHabitsSubtab('tasks')">📋 Tâches<span class="habits-subtab-dot" id="habits-tasks-dot" style="display:none;"></span></button>
        </div>

        <!-- Sub: Habitudes -->
        <div id="habits-content-habits">
            <div class="avatar-stage" id="habits-avatar-stage"></div>
            <div class="avatar-username-wrap">
                <span class="avatar-username" id="habit-username" onclick="startEditUsername(this)">Hero</span>
                <div class="avatar-title" id="habit-title">— — —</div>
            </div>
            <div style="text-align:center;margin-bottom:14px;">
                <span id="discipline-level-label" style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--text-dim);"></span>
            </div>
            <div class="streak-row">
                <div class="streak-pill">
                    <span class="streak-pill-icon">🔥</span>
                    <div>
                        <div class="streak-pill-val" id="pill-perfect">0/8</div>
                        <div class="streak-pill-lbl">Streak Parfait</div>
                    </div>
                </div>
                <div class="streak-pill">
                    <span class="streak-pill-icon">🏆</span>
                    <div>
                        <div class="streak-pill-val" id="pill-streak">0</div>
                        <div class="streak-pill-lbl">Record Parfait</div>
                    </div>
                </div>
            </div>
            <div class="section-title">Habitudes du jour</div>
            <div class="add-habit-form">
                <input type="text" id="habit-input"
                    placeholder="Ajouter une habitude..."
                    onkeypress="if(event.key==='Enter') openAddHabitModal()" />
                <button class="btn-gold" onclick="openAddHabitModal()">Ajouter</button>
            </div>
            <div class="habits-list" id="habits-list"></div>
        </div>

        <!-- Sub: Tâches (V8.0) -->
        <div id="habits-content-tasks" style="display:none;">
            <div id="tasks-content"><!-- rendered by renderTasksPage() --></div>
        </div>
    </div>

    <!-- PAGE: SESSIONS -->
    <div class="page" data-page="sessions">
        <div class="avatar-stage" id="sessions-avatar-stage"></div>
        <div class="avatar-username-wrap" style="margin-bottom:20px;">
            <span class="avatar-username" style="cursor:default;">Sessions</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <div class="section-title" style="margin:0;">Sessions actives</div>
            <button class="btn-blue" style="padding:10px 18px;font-size:0.82rem;"
                onclick="openNewSessionModal()">+ Nouvelle Session</button>
        </div>
        <div class="sessions-list" id="sessions-list"></div>
    </div>

    <!-- PAGE: CAMPAGNE -->
    <div class="page" data-page="campagne">
        <div class="camp-subtab-row">
            <button class="camp-subtab active" data-subtab="boss" onclick="switchCampSubtab('boss')">⚔️ Boss</button>
            <button class="camp-subtab" data-subtab="quetes" onclick="switchCampSubtab('quetes')">🗡️ Quêtes</button>
            <button class="camp-subtab" data-subtab="equip" onclick="switchCampSubtab('equip')">🛡️ Équipement</button>
        </div>
        <div id="camp-content"></div>
    </div>

    <!-- PAGE: PROFIL -->
    <div class="page" data-page="profil">
        <!-- V7.0a: sub-tabs Profil / Journal -->
        <div class="prof-subtab-row">
            <button class="prof-subtab active" data-subtab="profil" onclick="switchProfSubtab('profil')">👤 Profil</button>
            <button class="prof-subtab" data-subtab="journal" onclick="switchProfSubtab('journal')">📖 Journal<span class="prof-subtab-dot" id="prof-journal-dot" style="display:none;"></span></button>
        </div>

        <!-- Sub: Profil -->
        <div id="prof-content-profil">
            <div class="profile-header">
                <div class="profil-avatar-small" id="profil-avatar-small"></div>
                <div class="profile-name" id="profil-username">Hero</div>
                <div class="avatar-title" id="profil-active-title" style="font-size:0.82rem;color:var(--gold-dim);min-height:18px;">— — —</div>
                <div class="profile-level" id="profil-level">Niveau Global 1</div>
            </div>
            <div class="global-xp-card" style="margin-bottom:16px;">
                <div class="global-xp-header">
                    <span class="global-xp-label" id="global-level-label">Niveau Global · 1 / 100</span>
                    <span class="global-xp-value" id="global-xp-val">0 / 60 XP</span>
                </div>
                <div class="xp-bar-bg">
                    <div class="xp-bar-fill" id="global-xp-fill" style="width:0%"></div>
                </div>
            </div>
            <div class="section-title">Compétences</div>
            <div class="skill-bars" id="profil-skill-bars"></div>
            <div class="section-title" style="margin-top:16px;">💭 Humeur</div>
            <div id="profil-mood-section"></div>
            <div class="section-title" style="margin-top:16px;">Titres</div>
            <div id="profil-titles-section"></div>
        </div>

        <!-- Sub: Journal (V7.0a) -->
        <div id="prof-content-journal" style="display:none;">
            <div id="journal-content"><!-- rendered by renderJournalPage() --></div>
        </div>
    </div>

</div>

<!-- Bottom tab bar -->
<nav class="tab-bar">
    <button class="tab-btn active" data-tab="habits" onclick="switchTab('habits')">
        <span class="tab-icon">🏠</span>Habitudes
    </button>
    <button class="tab-btn" data-tab="sessions" onclick="switchTab('sessions')">
        <span class="tab-icon">⚡</span>Sessions
    </button>
    <button class="tab-btn" data-tab="campagne" onclick="switchTab('campagne')">
        <span class="tab-icon">⚔️</span>Campagne
    </button>
    <button class="tab-btn" data-tab="profil" onclick="switchTab('profil')">
        <span class="tab-icon">👤</span>Profil
    </button>
</nav>

<script src="app.js?v=8.1"></script>
</body>
</html>
